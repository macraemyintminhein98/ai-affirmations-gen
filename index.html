<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AffirmFlow AI - Personalized Affirmations</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md max-w-md w-full text-center">
        <h1 class="text-3xl font-bold mb-4">AffirmFlow AI</h1>
        <p class="text-gray-600 mb-6">Your daily dose of personalized, actionable affirmations.</p>

        <form id="affirmationForm" class="space-y-4">
            <div>
                <label for="challenge" class="block text-sm font-medium text-gray-700 mb-1">What challenge or goal do you have?</label>
                <input type="text" id="challenge" name="challenge" placeholder="e.g., 'reduce anxiety before presentations'" 
                       class="w-full p-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
            </div>
            <button type="submit" 
                    class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition duration-300">
                Generate Affirmations
            </button>
        </form>
        
        <div id="result" class="mt-6 hidden">
            <h2 class="text-xl font-semibold mb-3">Your Personalized Affirmations:</h2>
            <ul id="affirmationList" class="list-disc list-inside text-left space-y-1 mb-4"></ul>
            <button id="downloadBtn" class="bg-green-600 text-white p-2 rounded-md hover:bg-green-700 transition duration-300">
                Download (.txt)
            </button>
        </div>
    </div>

    <script>
        document.getElementById('affirmationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const challenge = document.getElementById('challenge').value;
            // In a real app, this would hit your backend for payment and AI generation.
            // For this static demo, we'll simulate.
            setTimeout(() => {
                const affirmations = [
                    `I am prepared and confident for my presentation.`, 
                    `I breathe deeply and speak clearly.`, 
                    `My message is valuable and well-received.`, 
                    `I release any fear and embrace this opportunity to share.`, 
                    `I connect with my audience and deliver with poise.`
                ];
                const list = document.getElementById('affirmationList');
                list.innerHTML = '';
                affirmations.forEach(aff => {
                    const li = document.createElement('li');
                    li.textContent = aff;
                    list.appendChild(li);
                });
                document.getElementById('result').classList.remove('hidden');
            }, 1500);
        });

        document.getElementById('downloadBtn').addEventListener('click', function() {
            const affirmationsText = Array.from(document.querySelectorAll('#affirmationList li'))
                                       .map(li => li.textContent)
                                       .join('\n');
            const blob = new Blob([affirmationsText], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_affirmations.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
